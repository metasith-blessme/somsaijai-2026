<style>
:root{--bg:#f0f4f8;--card:#fff;--primary:#1f4e79;--accent:#ff6600;--green:#2e7d32;--red:#c62828;--text:#333;--muted:#666;--border:#dde}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:linear-gradient(135deg,var(--primary),#2d6ea5);color:#fff;padding:20px 30px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:1.6em;font-weight:700}
.header .sub{opacity:.85;font-size:.9em}
.drop-zone{border:2px dashed rgba(255,255,255,.5);border-radius:10px;padding:12px 24px;cursor:pointer;font-size:.9em;transition:.3s}
.drop-zone:hover,.drop-zone.dragover{border-color:#fff;background:rgba(255,255,255,.15)}
.container{max-width:1400px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 22px;background:var(--card);border:2px solid var(--border);border-radius:8px 8px 0 0;cursor:pointer;font-weight:600;transition:.2s;font-size:.95em}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tab:hover:not(.active){background:#e8f0fe}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--primary);transition:.2s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.kpi .label{font-size:.8em;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi .value{font-size:1.8em;font-weight:700;color:var(--primary)}
.kpi .unit{font-size:.75em;color:var(--muted)}
.kpi.green{border-color:var(--green)}.kpi.green .value{color:var(--green)}
.kpi.orange{border-color:var(--accent)}.kpi.orange .value{color:var(--accent)}
.kpi.red{border-color:var(--red)}.kpi.red .value{color:var(--red)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-card h3{font-size:1em;color:var(--primary);margin-bottom:12px}
.chart-card canvas{width:100%!important;max-height:300px}
.table-wrap{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto;margin-bottom:24px}
.table-wrap h3{font-size:1em;color:var(--primary);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:.85em}
th{background:var(--primary);color:#fff;padding:10px 8px;text-align:center;white-space:nowrap}
td{padding:8px;text-align:center;border-bottom:1px solid var(--border)}
tr:nth-child(even){background:#f8fafc}
tr:hover{background:#e8f0fe}
.total-row td{background:#d6e4f0!important;font-weight:700;color:var(--primary)}
@media(max-width:900px){.charts{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid{grid-template-columns:1fr}}
.status{padding:8px 16px;background:#e8f0fe;border-radius:8px;text-align:center;margin-bottom:16px;font-size:.9em;color:var(--primary)}
</style>
</head>

let DATA = JSON.parse(JSON.stringify(BUILT_IN));
let currentMonth = 'all';
let charts = {};

function fmt(n){return n.toLocaleString('en-US')}
function sum(arr,k){return arr.reduce((s,r)=>s+(r[k]||0),0)}
function avg(arr,k){return arr.length?sum(arr,k)/arr.length:0}

function getMonthData(m){
  if(m==='all') return [...DATA.Jan26,...DATA.Feb26,...DATA.Mar26,...DATA.Apr26];
  return DATA[m]||[];
}

function renderTabs(){
  const tabs=[{k:'all',l:'2026 Yearly'},{k:'Jan26',l:'January'},{k:'Feb26',l:'February'},{k:'Mar26',l:'March'},{k:'Apr26',l:'April'}];
  document.getElementById('monthTabs').innerHTML=tabs.map(t=>
    `<div class="tab ${t.k===currentMonth?'active':''}" onclick="switchMonth('${t.k}')">${t.l}</div>`
  ).join('');
}

function renderKPIs(data){
  const rev=sum(data,'rev'),cash=sum(data,'cash'),scan=sum(data,'scan'),exp=sum(data,'exp'),cups=sum(data,'tot');
  const days=data.length, avgRev=days?rev/days:0, revPerCup=cups?rev/cups:0;
  const cashPct=rev?((cash/rev)*100).toFixed(1):0;

  // Fixed Costs calculation
  const FIXED_COSTS_PER_MONTH = 66000;
  const numMonths = currentMonth === 'all' ? 4 : 1; // Jan, Feb, Mar, Apr
  const totalFixedCosts = numMonths * FIXED_COSTS_PER_MONTH;
  const netMargin = rev - exp - totalFixedCosts;

  const html=`
    <div class="kpi"><div class="label">Total Revenue</div><div class="value">฿${fmt(rev)}</div><div class="unit">${days} days</div></div>
    <div class="kpi green"><div class="label">Avg Revenue/Day</div><div class="value">฿${fmt(Math.round(avgRev))}</div></div>
    <div class="kpi orange"><div class="label">Total Cash</div><div class="value">฿${fmt(cash)}</div><div class="unit">${cashPct}% of revenue</div></div>
    <div class="kpi"><div class="label">Total Scan/Transfer</div><div class="value">฿${fmt(scan)}</div><div class="unit">${rev?(100-cashPct).toFixed(1):0}% of revenue</div></div>
    <div class="kpi red"><div class="label">Total Expenses</div><div class="value">฿${fmt(exp)}</div><div class="unit">Avg ฿${fmt(Math.round(exp/days))}/day</div></div>
    <div class="kpi green"><div class="label">Total Cups Sold</div><div class="value">${fmt(cups)}</div><div class="unit">Avg ${Math.round(cups/days)}/day</div></div>
    <div class="kpi orange"><div class="label">Revenue per Cup</div><div class="value">฿${revPerCup.toFixed(1)}</div></div>
    <div class="kpi" style="border-left: 4px solid var(--accent); background: #fff8f0;"><div class="label">Net Margin (Net Profit)</div><div class="value" style="color:var(--accent)">฿${fmt(netMargin)}</div><div class="unit">After ฿${fmt(totalFixedCosts)} fixed costs</div></div>
  `;
  document.getElementById('kpiGrid').innerHTML=html;
}

function destroyCharts(){Object.values(charts).forEach(c=>{if(c)c.destroy()});charts={}}

function renderCharts(data){
  destroyCharts();
  const labels=data.map(r=>r.d);
  const colors={primary:'#1f4e79',accent:'#ff6600',green:'#2e7d32',red:'#c62828',blue:'#1976d2',purple:'#7b1fa2',teal:'#00796b'};

  charts.rev=new Chart(document.getElementById('chartRevenue'),{
    type:'line',

      {label:'Revenue',data:data.map(r=>r.rev),borderColor:colors.primary,backgroundColor:'rgba(31,78,121,.1)',fill:true,tension:.3,pointRadius:1.5},
      {label:'Cash',data:data.map(r=>r.cash),borderColor:colors.green,borderDash:[4,4],tension:.3,pointRadius:0},
      {label:'Scan',data:data.map(r=>r.scan),borderColor:colors.accent,borderDash:[4,4],tension:.3,pointRadius:0}
    ]},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'฿'+v.toLocaleString()}},x:{ticks:{maxTicksToShow:15,maxRotation:45}}}}
  });

  const cashT=sum(data,'cash'),scanT=sum(data,'scan');
  charts.pay=new Chart(document.getElementById('chartPayment'),{
    type:'doughnut',
    data:{labels:['Cash','Scan/Transfer'],datasets:[{data:[cashT,scanT],backgroundColor:[colors.green,colors.blue],borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}}}
  });

  const cupData=[sum(data,'or'),sum(data,'wm'),sum(data,'mg'),sum(data,'co'),sum(data,'yco'),sum(data,'ap')];
  const cupLabels=['Orange','Watermelon','Mango','Coconut','Young Coconut','Apple'];
  const cupColors=['#ff9800','#4caf50','#ffc107','#795548','#a5d6a7','#f44336'];
  charts.cups=new Chart(document.getElementById('chartCups'),{
    type:'bar',
    data:{labels:cupLabels,datasets:[{label:'Cups Sold',data:cupData,backgroundColor:cupColors}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });

  charts.used=new Chart(document.getElementById('chartUsed'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Orange (baskets)',data:data.map(r=>r.uo),backgroundColor:'rgba(255,152,0,.7)'},
      {label:'Watermelon (pcs)',data:data.map(r=>r.uw),backgroundColor:'rgba(76,175,80,.7)'},
      {label:'Coconut Meat',data:data.map(r=>r.uco_meat||0),backgroundColor:'rgba(121,95,72,.7)'},
      {label:'Coconut Water',data:data.map(r=>r.uco_water||0),backgroundColor:'rgba(156,137,120,.7)'},
      {label:'Coconut Conden',data:data.map(r=>r.uco_conden||0),backgroundColor:'rgba(141,110,99,.7)'},
      {label:'Coconut Raw',data:data.map(r=>r.uco_raw||0),backgroundColor:'rgba(188,170,156,.7)'}
    ]},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12}}},scales:{y:{beginAtZero:true},x:{ticks:{maxRotation:45}}}}
  });
}

function renderTable(data){
  const hdr=['Date','Day','Revenue','Cash','Expenses','Scan','Orange','Watermelon','Mango','Coconut','Young Coconut','Apple','Total Cups','Bot Big','Used Or.','Used WM','UCO Meat','UCO Water','UCO Conden','UCO Raw'];
  document.getElementById('tHead').innerHTML='<tr>'+hdr.map(h=>`<th>${h}</th>`).join('')+'</tr>';
  let rows=data.map(r=>`<tr>
    <td>${r.d}</td><td>${r.day}</td><td>${fmt(r.rev)}</td><td>${fmt(r.cash)}</td><td>${fmt(r.exp)}</td><td>${fmt(r.scan)}</td>
    <td>${r.or}</td><td>${r.wm}</td><td>${r.mg}</td><td>${r.co}</td><td>${r.yco||0}</td><td>${r.ap}</td><td><b>${r.tot}</b></td><td>${r.bb}</td><td>${r.uo}</td><td>${r.uw}</td><td>${r.uco_meat||0}</td><td>${r.uco_water||0}</td><td>${r.uco_conden||0}</td><td>${r.uco_raw||0}</td>
  </tr>`).join('');
  // Total row
  const t=k=>sum(data,k);
  rows+=`<tr class="total-row"><td>TOTAL</td><td>${data.length}d</td><td>${fmt(t('rev'))}</td><td>${fmt(t('cash'))}</td><td>${fmt(t('exp'))}</td><td>${fmt(t('scan'))}</td>
    <td>${fmt(t('or'))}</td><td>${fmt(t('wm'))}</td><td>${fmt(t('mg'))}</td><td>${fmt(t('co'))}</td><td>${fmt(t('ap'))}</td><td><b>${fmt(t('tot'))}</b></td><td>${t('bb')}</td><td>${t('uo').toFixed(1)}</td><td>${t('uw')}</td><td>${t('uco_meat')}</td><td>${t('uco_water')}</td><td>${t('uco_conden')}</td><td>${t('uco_raw')}</td></tr>`;
  document.getElementById('tBody').innerHTML=rows;
}

function switchMonth(m){
  currentMonth=m;
  const data=getMonthData(m);
  renderTabs();renderKPIs(data);renderCharts(data);renderTable(data);
  const names={all:'2026 Summary',Jan26:'January 2026',Feb26:'February 2026',Mar26:'March 2026',Apr26:'April 2026'};
  document.getElementById('tableTitle').textContent='Daily Detail - '+names[m];
}

// ── FILE UPLOAD ─────────────────────────────────────────────────────────────
function parseXLSX(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const newData={};
      wb.SheetNames.forEach(sn=>{
        const key=sn.replace(/\s/g,'');
        if(!['Jan26','Feb26','Mar26','Apr26'].includes(key))return;
        const ws=wb.Sheets[sn];
        const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:0});
        const rows=[];
        for(let i=3;i<json.length;i++){
          const r=json[i];
          if(!r||!r[0]||String(r[0]).toUpperCase()==='TOTAL'||String(r[0]).toUpperCase()==='AVG/DAY')continue;
          rows.push({d:String(r[0]),day:String(r[1]||''),rev:Number(r[2])||0,cash:Number(r[3])||0,exp:Number(r[4])||0,scan:Number(r[6])||0,
            or:Number(r[7])||0,wm:Number(r[8])||0,mg:Number(r[9])||0,co:Number(r[10])||0,ap:Number(r[11])||0,tot:Number(r[12])||0,
            bb:Number(r[13])||0,bs:Number(r[14])||0,uo:Number(r[15])||0,uw:Number(r[16])||0});
        }
        if(rows.length) newData[key]=rows;
      });
      if(Object.keys(newData).length){
        Object.assign(DATA,newData);
        document.getElementById('statusBar').textContent='✅ Data updated from: '+file.name+' ('+new Date().toLocaleString()+')';
        document.getElementById('statusBar').style.background='#e8f5e9';
        switchMonth(currentMonth);
      } else {
        document.getElementById('statusBar').textContent='⚠️ No matching sheets found (expecting Jan26, Feb26, Mar26, Apr26)';
        document.getElementById('statusBar').style.background='#fff3e0';
      }
    }catch(err){
      document.getElementById('statusBar').textContent='❌ Error reading file: '+err.message;
      document.getElementById('statusBar').style.background='#fce4ec';
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleFile(file){
  if(!file)return;
  if(file.name.endsWith('.csv')){
    document.getElementById('statusBar').textContent='CSV support: please use .xlsx format for full dashboard update';
    document.getElementById('statusBar').style.background='#fff3e0';
    return;
  }
  parseXLSX(file);
}

const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');handleFile(e.dataTransfer.files[0])});
document.getElementById('fileInput').addEventListener('change',e=>handleFile(e.target.files[0]));

// ── INIT ────────────────────────────────────────────────────────────────────
switchMonth('all');
